name: generate snake

on:
  schedule:
    - cron: '0 4 * * *'   # 4:00am UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: Platane/snk/svg-only@d8f6715049803e982ee5ff501b6b9b7d5deeb09b  # v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - uses: crazy-max/ghaction-github-pages@1d6ee9b181a81033a16bd707a1401afa978daab4  # v5.0.0
        with:
          target_branch: output
          build_dir: dist
          keep_history: true
          commit_message: 'regen snake'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
